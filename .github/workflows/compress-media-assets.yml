name: Check Media Compression

on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.png"
      - "**/*.gif"
      - "**/*.mp4"
      - ".github/workflows/compress-media-assets.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-media-compression-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-media-compression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install media optimization tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg gifsicle optipng

      - name: Compress tracked media assets
        id: compression-check
        shell: bash
        run: |
          set -euxo pipefail

          files_to_process="$(mktemp)"
          changed_files="$(mktemp)"
          artifact_dir="compressed-media-changes"
          max_lossless_iterations=20
          rm -rf "$artifact_dir"
          mkdir -p "$artifact_dir"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git ls-files -z -- '*.png' '*.gif' '*.mp4' > "$files_to_process"
          else
            git diff -z --name-only --no-renames --diff-filter=ACMRT "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- '*.png' '*.gif' '*.mp4' > "$files_to_process"
          fi

          if [ ! -s "$files_to_process" ]; then
            echo "No media files to process."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            rm -f "$files_to_process"
            rm -f "$changed_files"
            exit 0
          fi

          file_size() {
            stat --format='%s' "$1"
          }

          compress_png() {
            local input="$1"
            local before_size
            local after_size

            if [ ! -f "$input" ]; then
              echo "::warning::Skipping missing PNG file: $input"
              return 0
            fi

            for _ in $(seq 1 "$max_lossless_iterations"); do
              before_size="$(file_size "$input")"
              if ! optipng -quiet -o2 "$input"; then
                echo "::warning::optipng failed for PNG: $input"
                return 0
              fi

              after_size="$(file_size "$input")"
              if [ "$after_size" -lt "$before_size" ]; then
                pass_changed=true
                continue
              fi

              break
            done
          }

          compress_gif() {
            local input="$1"
            local tmp
            local before_size

            if [ ! -f "$input" ]; then
              echo "::warning::Skipping missing GIF file: $input"
              return 0
            fi

            for _ in $(seq 1 "$max_lossless_iterations"); do
              before_size="$(file_size "$input")"
              tmp="$(mktemp --suffix=.gif)"

              if ! gifsicle --optimize=3 "$input" -o "$tmp"; then
                echo "::warning::gifsicle failed for GIF: $input"
                rm -f "$tmp"
                return 0
              fi

              if [ ! -s "$tmp" ] || [ "$(file_size "$tmp")" -ge "$before_size" ]; then
                rm -f "$tmp"
                break
              fi

              mv "$tmp" "$input"
              pass_changed=true
            done
          }

          compress_mp4() {
            local input="$1"
            local tmp

            if [ ! -f "$input" ]; then
              echo "::warning::Skipping missing MP4 file: $input"
              return 0
            fi

            tmp="$(mktemp --suffix=.mp4)"

            if ! ffmpeg -hide_banner -loglevel error -y \
              -i "$input" \
              -map 0 \
              -c copy \
              -movflags +faststart \
              "$tmp"; then
              echo "::warning::Skipping $input because ffmpeg failed to remux it."
              rm -f "$tmp"
              return 0
            fi

            if [ ! -s "$tmp" ] || [ "$(file_size "$tmp")" -ge "$(file_size "$input")" ]; then
              rm -f "$tmp"
              return 0
            fi

            mv "$tmp" "$input"
            pass_changed=true
          }

          pass_changed=false
          while IFS= read -r -d '' file; do
            case "$file" in
              *.png)
                compress_png "$file"
                ;;
              *.gif)
                compress_gif "$file"
                ;;
              *.mp4)
                compress_mp4 "$file"
                ;;
            esac
          done < "$files_to_process"

          : > "$changed_files"
          while IFS= read -r -d '' file; do
            if ! git diff --quiet -- "$file"; then
              printf '%s\n' "$file" >> "$changed_files"
            fi
          done < "$files_to_process"

          if [ ! -s "$changed_files" ]; then
            echo "No compression changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            rm -f "$files_to_process"
            rm -f "$changed_files"
            exit 0
          fi

          while IFS= read -r file; do
            [ -f "$file" ] || continue
            mkdir -p "$artifact_dir/$(dirname "$file")"
            cp "$file" "$artifact_dir/$file"
          done < "$changed_files"

          cp "$changed_files" "$artifact_dir/changed-files.txt"
          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          rm -f "$files_to_process"
          rm -f "$changed_files"

      - name: Upload compressed media artifact
        if: steps.compression-check.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: compressed-media-assets
          path: compressed-media-changes
          if-no-files-found: error

      - name: Fail if compression updates are needed
        if: steps.compression-check.outputs.has_changes == 'true'
        shell: bash
        run: |
          echo "::error::Media assets can be compressed further. Download artifact 'compressed-media-assets' and apply those files in the PR."
          exit 1
